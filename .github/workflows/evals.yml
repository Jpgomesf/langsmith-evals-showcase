name: evals

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *"   # nightly live gate
  workflow_dispatch:

jobs:
  quality:
    name: lint · typecheck · unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run ruff check src tests
      - run: uv run mypy
      - run: uv run pytest

  gate:
    name: live regression gate
    runs-on: ubuntu-latest
    # Only run where credentials exist: scheduled, manual, or pushes to main.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    needs: quality
    env:
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_TRACING: "true"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - name: Seed datasets
        run: uv run evals seed
      - name: Run live eval gates
        run: uv run pytest -m live
