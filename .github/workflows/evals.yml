name: evals

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:   # the live gate runs only when triggered manually

jobs:
  quality:
    name: lint · typecheck · unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run ruff check src tests
      - run: uv run mypy
      - run: uv run pytest

  gate:
    name: live regression gate
    runs-on: ubuntu-latest
    # Manual-only: trigger from Actions → evals → Run workflow when you want it.
    if: github.event_name == 'workflow_dispatch'
    needs: quality
    env:
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_TRACING: "true"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      # Skip (green) when credentials aren't configured, so the public repo
      # doesn't show a red ✗. Add the repo secrets to enable the live gate.
      - name: Check for credentials
        id: creds
        run: |
          if [ -n "$LANGSMITH_API_KEY" ] && [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Live gate skipped — add LANGSMITH_API_KEY and ANTHROPIC_API_KEY repo secrets to enable it."
          fi
      - uses: actions/checkout@v4
        if: steps.creds.outputs.ready == 'true'
      - uses: astral-sh/setup-uv@v5
        if: steps.creds.outputs.ready == 'true'
        with:
          python-version: "3.12"
      - name: Install
        if: steps.creds.outputs.ready == 'true'
        run: uv sync
      - name: Seed datasets
        if: steps.creds.outputs.ready == 'true'
        run: uv run evals seed
      - name: Run live eval gates
        if: steps.creds.outputs.ready == 'true'
        run: uv run pytest -m live
